providers:
  -
    name: NVIDIA Official AI Endpoint
    type: nvidia_ai_endpoints
    base_url: https://integrate.api.nvidia.com/v1
    api_key: ${NVIDIA_API_KEY_HERE}
    config:
      scan_models: true
      scan_models_endpoint: /models
    models:
      # Foundation Models
      -
        type: foundation_model
        name: GPT OSS 120B
        creator: OpenAI
        id: openai/gpt-oss-120b
        default: true
      -
        type: foundation_model
        name: GPT OSS 20B
        creator: OpenAI
        id: openai/gpt-oss-20b
      -
        type: foundation_model
        name: Qwen 3.5 112B A10B
        creator: Alibaba
        id: qwen/qwen3.5-122b-a10b
      -
        type: foundation_model
        name: Qwen 3.5 397B A17B
        creator: Alibaba
        id: qwen/qwen3.5-397b-a17b
      -
        type: foundation_model
        name: GLM 5
        creator: "Z.aI"
        id: z-ai/glm5
      -
        type: foundation_model
        name: Solar 10.7B Instruct
        creator: Upstage
        id: upstage/solar-10.7b-instruct

      # Embedding_model
      -
        type: embedding_model
        name: Llama Nemotron Embed VL 1B V2
        id: nvidia/llama-nemotron-embed-1b-v2

# Application Settings
app:
  name: AI Studio 2.0
  agent: AI Studio 2.0
